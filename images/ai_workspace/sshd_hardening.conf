# SSH server hardening for ai_workspace.
#
# Loaded via the standard /etc/ssh/sshd_config.d/*.conf include in
# Ubuntu's default sshd_config. Everything here is a non-negotiable
# baseline; runtime configuration (Port) goes into a separate snippet
# written by entrypoint.sh.

PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
UsePAM yes

# Force pubkey-only for our sandbox user; no other auth methods.
AuthenticationMethods publickey
